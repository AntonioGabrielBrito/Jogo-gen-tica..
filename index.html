<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo Minado Genético PRO</title>
<style>
  body { font-family: Arial; text-align: center; background:#111; color:#fff; }
  #grid { display: grid; gap: 4px; justify-content: center; margin-top:20px; }
  .cell { width:40px; height:40px; background:#444; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; }
  .revealed { background:#ddd; color:#000; }
  .flag { background:orange; }
</style>
</head>
<body>
<h1>Campo Minado Genético 🧬</h1>
<p>Clique = revelar | Segurar = bandeira 🚩</p>
<button onclick="startGame()">Nova Fase</button>
<div id="grid"></div><script>
const size = 10;
const mineChance = 0.2;
let board = [];
let revealed = [];
let flags = [];

function startGame(){
  board = [];
  revealed = [];
  flags = [];

  for(let i=0;i<size;i++){
    board[i]=[];
    revealed[i]=[];
    flags[i]=[];
    for(let j=0;j<size;j++){
      board[i][j] = Math.random()<mineChance ? "aa" : "safe";
      revealed[i][j] = false;
      flags[i][j] = false;
    }
  }

  const grid = document.getElementById("grid");
  grid.style.gridTemplateColumns = `repeat(${size}, 40px)`;
  render();
}

function getNeighbors(x,y){
  let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  return dirs
    .map(([dx,dy])=>[x+dx,y+dy])
    .filter(([i,j])=> i>=0 && j>=0 && i<size && j<size);
}

function countMines(x,y){
  return getNeighbors(x,y)
    .filter(([i,j])=> board[i][j]==="aa").length;
}

function reveal(x,y){
  if(revealed[x][y] || flags[x][y]) return;

  revealed[x][y]=true;

  if(board[x][y]==="aa"){
    alert("💀 Você encontrou um gene recessivo (aa)! Perdeu!");
    startGame();
    return;
  }

  let count = countMines(x,y);

  if(count===0){
    getNeighbors(x,y).forEach(([i,j])=> reveal(i,j));
  }

  render();
  checkWin();
}

function toggleFlag(x,y){
  if(revealed[x][y]) return;
  flags[x][y] = !flags[x][y];
  render();
}

function checkWin(){
  for(let i=0;i<size;i++){
    for(let j=0;j<size;j++){
      if(board[i][j]!=="aa" && !revealed[i][j]) return;
    }
  }
  alert("🏆 Você venceu! Dominou a genética!");
  startGame();
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  for(let i=0;i<size;i++){
    for(let j=0;j<size;j++){
      const div = document.createElement("div");
      div.className="cell";

      if(revealed[i][j]){
        div.classList.add("revealed");
        let count = countMines(i,j);
        div.textContent = count===0 ? "" : count;
      }

      if(flags[i][j]){
        div.classList.add("flag");
        div.textContent = "🚩";
      }

      div.onclick = ()=> reveal(i,j);
      div.oncontextmenu = (e)=>{
        e.preventDefault();
        toggleFlag(i,j);
      };

      grid.appendChild(div);
    }
  }
}

startGame();
</script></body>
</html>
